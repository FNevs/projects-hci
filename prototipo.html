<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <title>Sêmea · Explorador Semântico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..600,30..100;1,9..144,300..600,30..100&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="thumbnails.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel" data-presets="react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "density": "comfortable"
    }/*EDITMODE-END*/;

    function Root() {
      const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
      return (
        <>
          <window.App density={tweaks.density} setDensity={(v) => setTweak('density', v)}/>
          <window.TweaksPanel title="Tweaks" initialPos={{ right: 24, bottom: 24 }}>
            <window.TweakSection title="Densidade da timeline">
              <window.TweakRadio
                value={tweaks.density}
                onChange={(v) => setTweak('density', v)}
                options={[
                  { value: 'comfortable', label: 'Confortável' },
                  { value: 'compact', label: 'Compacto' },
                ]}/>
            </window.TweakSection>
            <window.TweakSection title="Sobre">
              <div style={{ fontSize: 11.5, color: 'var(--ink-3)', lineHeight: 1.5 }}>
                Protótipo de média/alta fidelidade para o trabalho de IHC.
                Veja também o <a href="storyboard.html" style={{ color: 'var(--accent-terra)' }}>storyboard</a>.
              </div>
            </window.TweakSection>
          </window.TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
  </script>
</body>
</html>
